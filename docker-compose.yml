version: '3.8'

networks:
  ansible:
    driver: bridge
    name: ansible

services:
  # Traefik - Reverse Proxy
  ansible:
    image: traefik:v3.0
    container_name: ansible
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ansible
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Europe/Paris
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic.yml:/dynamic.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/logs:/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`caronboulme.fr`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=vk-hybrid@file"

  # Sesame - Serveur de certificats CA
  sesame:
    build:
      context: ../Sesame
      dockerfile: Dockerfile
    container_name: sesame
    restart: unless-stopped
    networks:
      - ansible
    environment:
      - TZ=Europe/Paris
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sesame.rule=Host(`caronboulme.fr`) && PathPrefix(`/cert`)"
      - "traefik.http.routers.sesame.entrypoints=websecure"
      - "traefik.http.routers.sesame.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sesame.service=sesame-service"
      - "traefik.http.routers.sesame.middlewares=local-networks-only@file"
      - "traefik.http.services.sesame-service.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

